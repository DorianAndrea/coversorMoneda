<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Monedas</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
    crossorigin="anonymous"
  >

  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

  <div class="contenedor">
    <div class="caja-conversor">
      <h1>Conversor de moneda Nacional</h1>

      <div class="mb-3">
        <label for="inputPesos" class="form-label">Pesos CLP</label>
        <input
          type="number"
          id="inputPesos"
          class="form-control"
          placeholder="Ingrese el monto en CLP"
        >
      </div>

      <div class="mb-3">
        <label for="selectMoneda" class="form-label">Moneda a convertir</label>
        <select id="selectMoneda" class="form-select">
          <option value="">Seleccione moneda</option>
        </select>
      </div>

      <button
        type="button"
        onclick="convertirMoneda()"
        class="btn btn-primary w-100"
      >
        Buscar
      </button>

      <p id="resultado" class="mt-3">...</p>

      <canvas id="graficoMoneda" class="mt-4"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./assets/js/script.js"></script>
</body>
</html>
